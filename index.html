<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart School - Hệ Thống Quản Lý Trắc Nghiệm</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body { background: radial-gradient(circle at top right, #4f46e5, #764ba2); min-height: 100vh; font-family: 'Inter', sans-serif; }
    .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
    .menu-item { transition: all 0.3s ease; padding: 10px 12px; border-radius: 12px; }
    .menu-item:hover { background: rgba(255,255,255,0.15); transform: translateX(5px); }
    .submenu-container { max-height: 0; overflow: hidden; transition: all 0.4s ease-out; opacity: 0; padding-left: 1.5rem; }
    .submenu-container.open { max-height: 150px; opacity: 1; margin-top: 0.5rem; }
    .submenu-item { position: relative; padding-left: 1rem; border-left: 1px dashed rgba(255,255,255,0.3); }
    .rotate-icon { transition: transform 0.3s ease; }
    .rotate-icon.rotate { transform: rotate(90deg); }
    .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.98); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; color: #4f46e5; }
  </style>
</head>
<body class="text-white antialiased">
  
  <div id="loading" class="loading-overlay">
    <div class="w-14 h-14 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mb-4"></div>
    <div class="font-bold tracking-wide text-lg animate-pulse">Đang kết nối hệ thống...</div>
  </div>

  <div id="mainContent">
    <header class="main-header sticky top-0 z-[1000]">
      <div class="header-inner mx-auto px-4 md:px-6 flex items-center justify-between">
        <div class="flex items-center gap-3 cursor-pointer group" onclick="chuyenTrang('00_Index')">
          <div class="bg-indigo-600 rounded-xl p-2 shadow-lg group-hover:scale-105 transition-transform"><i class="fas fa-rocket text-white text-xl"></i></div>
          <div class="flex flex-col leading-none hidden sm:flex"><span class="text-indigo-900 font-black text-lg uppercase">Smart<span class="text-indigo-500">School</span></span><span class="text-[9px] text-slate-400 font-bold">VER 2.0 • 2026</span></div>
        </div>

        <div id="userHeader" class="flex items-center gap-4">
          <div class="user-profile-card flex items-center pl-4 pr-1.5 py-1.5 rounded-2xl border border-slate-100 bg-white shadow-sm hover:shadow-md transition-all cursor-pointer">
            <div class="text-right mr-3 hidden sm:block">
              <div id="header-full-name" class="text-sm font-bold text-slate-800 leading-tight">Đang tải...</div>
              <div class="flex items-center justify-end gap-2 mt-0.5">
                <span id="header-object" class="text-[10px] font-bold text-indigo-600">---</span>
                <span id="header-perm" class="role-badge guest">Guest</span>
                <span id="header-user-id" class="text-[10px] text-slate-400 font-mono">ID: ----</span>
              </div>
            </div>
            <div class="relative avatar-wrapper">
              <img id="header-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=neutral" class="user-avatar" alt="Avatar">
              <div class="status-dot online"></div>
            </div>
            <button onclick="dangXuat()" class="logout-mini-btn ml-2" title="Đăng xuất">
              <i class="fas fa-power-off"></i>
            </button>
          </div>
        </div>

      </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-8">
      <section class="text-center mb-10">
        <h2 class="text-3xl md:text-5xl font-extrabold mb-3">SMART SCHOOL<br><span class="text-indigo-300">--- & ---</span></h2>
        <p class="text-indigo-100 text-sm md:text-base opacity-80">Tạo ngân hàng câu hỏi • Soạn đề tự động • Thi trực tuyến</p>
      </section>
      <div id="featureGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
    </main>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <div id="customModal" class="fixed inset-0 z-[10000] flex items-center justify-center hidden"><div class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div><div id="modalContent" class="glass relative max-w-sm w-full mx-4 p-8 rounded-[2rem] shadow-2xl border border-white/20 transform scale-90 opacity-0 transition-all duration-300"><div class="text-center"><div id="modalIcon"></div><h3 id="modalTitle" class="text-2xl font-bold mb-2"></h3><p id="modalMessage" class="text-indigo-100 opacity-80 mb-8"></p><div class="flex space-x-3"><button id="btnCancel" class="flex-1 px-6 py-3 bg-white/10 rounded-2xl">Hủy</button><button id="btnConfirm">Đồng ý</button></div></div></div></div>

  <script src="script.js"></script>
  <script src="index.js"></script>
</body>
</html>
