<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng Nhập Hệ Thống</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      background: radial-gradient(circle at top right, #4f46e5, #764ba2);
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }
    .login-box {
      background: #ffffff;
      padding: 45px 40px;
      border-radius: 28px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
      width: 100%;
      max-width: 420px;
      text-align: center;
      transition: all 0.4s ease;
      position: relative;
      z-index: 10;
    }
    .custom-input {
      width: 100%;
      background: #f1f5f9;
      border: 2px solid transparent;
      border-radius: 12px;
      color: #1e293b;
      transition: all 0.3s;
      outline: none;
      font-size: 15px;
    }
    #taiKhoan {
      padding-left: 60px !important; 
      padding-top: 16px !important;
      padding-bottom: 16px !important;
    }
    #matKhau {
      padding: 14px 16px 14px 45px;
    }
    .custom-input:focus {
      background: #fff;
      border-color: #4f46e5;
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
    }
    .custom-input:disabled { background-color: #e2e8f0; color: #94a3b8; cursor: not-allowed; }
    .user-icon { left: 22px !important; top: 50%; transform: translateY(-50%); font-size: 18px !important; color: #94a3b8; pointer-events: none; }
    .lock-icon { left: 18px; top: 50%; transform: translateY(-50%); color: #94a3b8; pointer-events: none; }
    .toggle-pass { right: 18px; top: 50%; transform: translateY(-50%); color: #94a3b8; cursor: pointer; padding: 5px; }
    .toggle-pass:hover { color: #4f46e5; }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
      20%, 40%, 60%, 80% { transform: translateX(5px); }
    }
    .shake-element { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; border-color: #ef4444 !important; }
    
    .btn-login {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
      padding: 14px;
      border-radius: 12px;
      font-weight: 600;
      width: 100%;
      transition: all 0.3s;
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
      position: relative;
      overflow: hidden;
      margin-top: 10px;
    }
    .btn-login:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(79, 70, 229, 0.4); }
    .btn-login:disabled { opacity: 0.7; cursor: not-allowed; }
    
    .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(5px); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9998; color: #4f46e5; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 9999; opacity: 0; visibility: hidden; transition: all 0.3s; }
    .modal-overlay.active { opacity: 1; visibility: visible; }
    .modal-box { background: white; padding: 32px; border-radius: 24px; width: 90%; max-width: 420px; transform: scale(0.9); transition: transform 0.3s; }
    .modal-overlay.active .modal-box { transform: scale(1); }
    .input-group { position: relative; margin-bottom: 16px; }
  </style>
</head>
<body class="antialiased">

  <div id="toast-container" class="toast-container"></div>

  <div id="loading" class="loading-overlay">
    <div class="w-16 h-16 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mb-4"></div>
    <div class="font-bold tracking-wide text-lg animate-pulse">Đang kết nối hệ thống...</div>
  </div>

  <div class="flex flex-col items-center justify-center min-h-screen px-4">
    <div class="login-box">
      <div class="relative inline-block mb-6">
        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" class="w-24 h-24 rounded-full bg-indigo-50 p-2 shadow-inner">
      </div>
      <h2 class="text-3xl font-bold text-gray-800 mb-1">Chào mừng bạn!</h2>
      <p class="text-gray-500 text-sm mb-8">Hệ thống trắc nghiệm thông minh</p>
      
      <div class="input-group">
        <i class="fas fa-user absolute user-icon"></i>
        <input type="text" list="taiKhoanList" id="taiKhoan" class="custom-input" 
               placeholder="UserID, NickName hoặc Email" 
               onkeydown="handleEnter(event, 'matKhau')">
        <datalist id="taiKhoanList"></datalist>
      </div>

      <div class="input-group">
        <i class="fas fa-lock absolute lock-icon"></i>
        <input type="password" id="matKhau" class="custom-input" placeholder="Mật khẩu" 
               onkeydown="handleEnter(event, 'login')">
        <i class="fas fa-eye toggle-pass absolute" onclick="togglePassword('matKhau', this)"></i>
      </div>

      <button id="loginBtn" class="btn-login" onclick="dangNhap()">
        <span>Đăng nhập</span>
      </button>

      <div class="flex justify-between items-center mt-6 text-sm">
         <a href="#" onclick="showToast('Vui lòng liên hệ GVCN để cấp lại mật khẩu', 'warning')" class="text-gray-500 hover:text-indigo-600 transition">Quên mật khẩu?</a>
      </div>
    </div>
  </div>

  <div id="changePassModal" class="modal-overlay">
    <div class="modal-box text-center">
      <div class="w-16 h-16 bg-yellow-100 text-yellow-600 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">
        <i class="fas fa-shield-alt"></i>
      </div>
      <h3 class="text-xl font-bold text-gray-800 mb-2">Yêu cầu bảo mật</h3>
      <p class="text-gray-600 mb-6 text-sm">Bạn đang dùng mật khẩu mặc định. Vui lòng đổi mật khẩu mới để tiếp tục.</p>
      
      <div class="input-group mb-3 relative">
        <i class="fas fa-key absolute lock-icon"></i>
        <input type="password" id="newPass" class="custom-input pl-12 py-3" placeholder="Mật khẩu mới"
               onkeydown="handleEnter(event, 'confirmPass')">
      </div>
      
      <div class="input-group mb-6 relative">
        <i class="fas fa-check-circle absolute lock-icon"></i>
        <input type="password" id="confirmPass" class="custom-input pl-12 py-3" placeholder="Xác nhận mật khẩu" 
               onkeydown="handleEnter(event, 'changePass')">
      </div>
      
      <button id="confirmBtn" onclick="confirmChangePass()" class="btn-login">Xác nhận thay đổi</button>
    </div>
  </div>

  <script src="script.js"></script>
  <script src="login.js"></script>
</body>
</html>
