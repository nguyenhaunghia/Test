<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trang cá nhân - Smart School</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
  
  <style>
    /* Tone màu nền Pastel sáng và dịu mắt */
    body { background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%); min-height: 100vh; font-family: 'Inter', sans-serif; color: #1e293b; }
    
    /* Giao diện Thẻ nhiệm vụ sáng màu */
    .card-glass { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05); }
    .card-glass:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1); transition: all 0.3s ease; }
    
    /* Thanh tiến trình bản sáng */
    .progress-bar { background: rgba(0,0,0,0.06); border-radius: 6px; overflow: hidden; position: relative; width: 100%; }
    .progress-fill { height: 100%; width: 0%; border-radius: 6px; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
    .progress-fill.luot { background: linear-gradient(90deg, #10b981, #34d399); }
    .progress-fill.tb { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
    .progress-fill.cao { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
    
    /* Nút bấm làm bài */
    .btn-play { border-radius: 12px; font-weight: 600; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; color: white; }
    .btn-play.complete { background: #10b981; }
    .btn-play.incomplete { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
    .btn-play:hover:not(:disabled) { filter: brightness(1.1); box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4); }
    .btn-play:active { transform: scale(0.98); }
    .btn-play:disabled { cursor: not-allowed; opacity: 0.6; filter: grayscale(1); background: #cbd5e1; color: #64748b; }
    
    .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; color: #6366f1; transition: opacity 0.3s; }
    
    /* Custom Scrollbar */
    .custom-scroll::-webkit-scrollbar { width: 5px; height: 5px; }
    .custom-scroll::-webkit-scrollbar-track { background: rgba(0,0,0,0.02); }
    .custom-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 10px; }
  </style>
</head>
<body class="antialiased">

  <input type="file" id="uploadInput" style="display: none;" onchange="xuLyFileDaChon()">

  <div id="loading" class="loading-overlay">
    <div class="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-3"></div>
    <div id="loadingText" class="font-bold tracking-wide text-sm text-indigo-700">Đang tải dữ liệu...</div>
  </div>

  <div id="mainContent">
    <header class="main-header sticky top-0 z-[1000] bg-white/60 backdrop-blur-lg border-b border-white/40 shadow-sm">
      <div class="header-inner w-full px-4 md:px-8 lg:px-10 py-2.5 flex items-center justify-between">
        <div class="flex items-center gap-3 cursor-pointer group" onclick="chuyenTrang('00_Index')">
          <div class="logo-box bg-gradient-to-br from-indigo-500 to-purple-600 rounded-lg p-2 shadow-md"><i class="fas fa-graduation-cap text-white text-xl"></i></div>
          <div class="flex flex-col leading-none hidden sm:flex"><span class="text-indigo-900 font-black text-xl uppercase tracking-tight">Smart<span class="text-indigo-500">School</span></span></div>
        </div>
        
        <div id="userHeader" class="flex items-center gap-3">
          <div class="user-profile-card flex items-center pl-4 pr-1.5 py-1.5 rounded-xl bg-white shadow-sm border border-indigo-50 cursor-pointer">
            <div class="text-right mr-3 hidden sm:block">
              <div id="header-full-name" class="text-sm font-bold text-slate-800 leading-tight">Đang tải...</div>
              <div class="flex items-center justify-end gap-1 mt-0.5">
                <span id="header-object" class="text-[10px] font-bold text-indigo-500">---</span>
              </div>
            </div>
            <div class="relative avatar-wrapper">
              <img id="header-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=neutral" class="w-9 h-9 rounded-full border-2 border-indigo-100 object-cover" alt="Avatar">
              <div class="status-dot online absolute bottom-0 right-0 w-3 h-3 bg-green-500 rounded-full border-2 border-white"></div>
            </div>
            <button onclick="dangXuat()" class="ml-2 text-slate-400 hover:text-red-500 p-2 transition-colors"><i class="fas fa-sign-out-alt text-base"></i></button>
          </div>
        </div>
      </div>
    </header>

    <main class="w-full mx-auto px-4 md:px-8 lg:px-10 py-8">
      
      <div id="taskList" class="grid grid-cols-1 xl:grid-cols-2 gap-6 xl:gap-8"></div>
      
      <div id="noTask" class="text-center py-24" style="display:none;">
        <i class="fas fa-check-circle text-7xl text-indigo-300 opacity-50 mb-5 animate-bounce"></i>
        <p class="text-xl font-medium text-indigo-800 opacity-80">Tuyệt vời! Hiện không có bài tập nào cần làm.</p>
      </div>
    </main>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script src="script.js"></script>
  <script src="hsinh.js"></script>
</body>
</html>
